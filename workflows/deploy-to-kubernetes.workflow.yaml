id: deploy-to-kubernetes
version: 1.0.0
name: Deploy to Kubernetes
status: proposed
kdd_stage: deployment
description: 'Orquesta la promocion de un servicio a Kubernetes con controles de manifiestos,
  configuracion y verificacion post-despliegue.

  '
inputs:
- name: service_name
  required: true
  description: Servicio a desplegar.
  type: string
- name: image_reference
  required: true
  description: Imagen versionada y aprobada.
  type: string
- name: cluster_environment
  required: true
  description: Entorno destino, por ejemplo dev, staging o prod.
  type: string
outputs:
- name: deployment_plan
  type: string
- name: manifest_review
  type: string
- name: rollout_report
  type: string
- name: rollback_notes
  type: string
guards:
- La imagen esta versionada de forma inmutable.
- Los manifiestos no incluyen secretos en claro.
- Existe estrategia de rollback documentada.
steps:
- id: plan-rollout
  role: platform-agent
  action: Definir entorno, namespace, recursos y estrategia de rollout.
  produces:
  - deployment_plan
  type: agent
- id: review-manifests
  role: security-agent
  action: Revisar recursos, limites, secretos y politicas.
  produces:
  - manifest_review
  type: agent
- id: apply-deployment
  role: execution-agent
  action: Ejecutar despliegue mediante la plataforma autorizada.
  produces:
  - rollout_event
  type: agent
- id: verify-rollout
  role: qa-agent
  action: Comprobar estado, health checks, logs y plan de rollback.
  produces:
  - rollout_report
  - rollback_notes
  type: agent
