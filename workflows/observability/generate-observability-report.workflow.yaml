id: generate-observability-report
name: Generate Observability Report
version: 0.1.0
status: proposed
kdd_stage: documentation
description: Generates a workflow observability report summarising execution rates, failures, approvals and evidence generation.
target_repositories:
  - 01-agent-orchestrator
inputs:
  - name: time_range
    type: string
    required: true
  - name: output_path
    type: string
    required: true
outputs:
  - name: observability_report_path
    type: string
agents:
  - kdd_admin_agent
  - documentation_agent
required_skills:
  - generate_observability_report
required_tools:
  - telemetry.query_workflow_runs
  - filesystem.write
approval:
  required: false
  reason: Report generation is read-only.
steps:
  - id: collect_metrics
    type: tool
    tool: telemetry.query_workflow_runs
  - id: generate_report
    type: skill
    skill: generate_observability_report
  - id: write_report
    type: tool
    tool: filesystem.write
evidence:
  required: true
  outputs:
    - observability_report_path
metrics:
  - observability_report_duration_seconds
