id: create-new-feature
version: 1.0.0
description: >
  Define el flujo para introducir una nueva feature desde el contexto de usuario
  hasta su validacion, manteniendo el proceso desacoplado del codigo.
inputs:
  - name: feature_name
    required: true
    description: Nombre corto y trazable de la feature.
  - name: user_need
    required: true
    description: Necesidad o resultado esperado por el usuario.
  - name: target_repository
    required: true
    description: Repositorio donde se implementara la logica.
outputs:
  - feature_brief
  - implementation_plan
  - acceptance_criteria
  - validation_report
guards:
  - La feature tiene alcance verificable.
  - Los criterios de aceptacion son observables.
  - El plan identifica los puntos de integracion con codigo externo.
steps:
  - id: frame-feature
    role: product-agent
    action: Convertir la necesidad en alcance, restricciones y criterios.
    produces:
      - feature_brief
      - acceptance_criteria
  - id: map-architecture
    role: architecture-agent
    action: Identificar modulos afectados, interfaces y riesgos.
    produces:
      - implementation_plan
  - id: coordinate-implementation
    role: implementation-agent
    action: Delegar la implementacion al repositorio de codigo correspondiente.
    produces:
      - implementation_handoff
  - id: validate-feature
    role: qa-agent
    action: Revisar criterios, pruebas y evidencia generada.
    produces:
      - validation_report
