$schema: "http://json-schema.org/draft-07/schema#"
title: WorkflowRun
description: Schema for a workflow execution request.
type: object
required: [workflow_id, inputs]
properties:
  workflow_id:
    type: string
  run_id:
    type: string
  triggered_by:
    type: string
  inputs:
    type: object
  context:
    type: object
    properties:
      environment:
        type: string
        enum: [development, staging, production]
      session_id:
        type: string
      dry_run:
        type: boolean
  metadata:
    type: object
    properties:
      correlation_id:
        type: string
      source_repository:
        type: string
      kdd_experiment_id:
        type: string
